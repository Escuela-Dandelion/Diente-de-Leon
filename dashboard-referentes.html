<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Ventas — Diente de León</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a1a; }

    /* ── LOGIN ── */
    #login { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .login-card {
      background:#fff; border-radius:20px; padding:40px 32px; width:100%; max-width:360px;
      box-shadow:0 4px 24px rgba(0,0,0,.08); text-align:center;
    }
    .login-card img  { max-width:140px; margin-bottom:28px; }
    .login-card h2   { font-size:20px; color:#1a1a6e; margin-bottom:6px; }
    .login-card p    { font-size:14px; color:#888; margin-bottom:28px; }
    .login-card input {
      width:100%; padding:16px; border:1.5px solid #e0e0e0; border-radius:12px;
      font-size:22px; text-align:center; letter-spacing:6px; margin-bottom:12px;
      outline:none; transition:border-color .2s;
    }
    .login-card input:focus { border-color:#1a1a6e; }
    .login-card button {
      width:100%; padding:16px; background:#1a1a6e; color:#fff; border:none;
      border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
    }
    .login-card button:hover    { background:#2d2d8e; }
    .login-card button:disabled { background:#aaa; cursor:not-allowed; }
    #login-error { color:#e63946; font-size:13px; margin-top:10px; display:none; }

    /* ── LAYOUT ── */
    #dashboard { display:none; height:100vh; display:none; flex-direction:column; }
    .topbar {
      background:#fff; border-bottom:1px solid #eee; padding:12px 20px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .topbar img      { height:34px; }
    .topbar-info h1  { font-size:15px; color:#1a1a6e; font-weight:700; }
    .topbar-info p   { font-size:11px; color:#aaa; }
    .topbar-btn {
      background:none; border:1px solid #ddd; border-radius:8px;
      padding:5px 12px; font-size:13px; cursor:pointer; color:#555;
    }

    .body-layout { display:flex; flex:1; overflow:hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width:220px; background:#fff; border-right:1px solid #eee;
      overflow-y:auto; flex-shrink:0; padding:20px 0;
    }
    .sidebar-logo {
      padding:0 16px 20px; border-bottom:1px solid #f0f0f0; margin-bottom:16px;
    }
    .sidebar-logo img { max-width:120px; }

    .sidebar-section { padding:0 16px 8px; }
    .sidebar-label   { font-size:10px; font-weight:700; color:#bbb; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }

    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px;
      border-radius:10px; cursor:pointer; font-size:14px; color:#555;
      margin-bottom:2px; transition:background .15s;
    }
    .nav-item:hover   { background:#f4f6f9; color:#1a1a1a; }
    .nav-item.active  { background:#f0f2ff; color:#1a1a6e; font-weight:600; }
    .nav-icon { font-size:16px; }

    .sidebar-divider { border:none; border-top:1px solid #f0f0f0; margin:12px 0; }

    .filter-label { font-size:12px; color:#888; margin-bottom:6px; padding:0 16px; }
    .filter-select {
      width:calc(100% - 32px); margin:0 16px 8px; padding:8px 10px;
      border:1px solid #e0e0e0; border-radius:8px; font-size:13px;
      background:#fff; cursor:pointer; outline:none;
    }
    .filter-select:focus { border-color:#1a1a6e; }

    /* ── MAIN ── */
    .main { flex:1; overflow-y:auto; padding:24px; }

    #loading-dash { text-align:center; padding:80px; color:#aaa; font-size:15px; }

    /* Cards */
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:24px; }
    .card  { background:#fff; border-radius:12px; padding:18px 16px; border:1px solid #eee; }
    .card-label { font-size:10px; color:#999; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .card-value { font-size:24px; font-weight:700; color:#1a1a6e; line-height:1; }

    /* Section */
    .section-card { background:#fff; border-radius:12px; border:1px solid #eee; padding:20px; margin-bottom:20px; }
    .section-title { font-size:14px; font-weight:700; color:#1a1a6e; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .section-title span { font-size:12px; font-weight:400; color:#aaa; }

    /* Pivot */
    .pivot-wrap { overflow:hidden; }

    /* Nivel 1 */
    .l1-row {
      padding:13px 18px; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; border-bottom:1px solid #dde0ff; user-select:none;
    }
    .l1-row.grado-color  { background:#f0f2ff; }
    .l1-row.grado-color:hover { background:#e6e9ff; }
    .l1-row.marca-color  { background:#f0f7ff; }
    .l1-row.marca-color:hover { background:#e3f0ff; }
    .l1-row.prod-color   { background:#f0fff4; }
    .l1-row.prod-color:hover  { background:#e0ffe8; }

    .l1-label { font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
    .l1-label.grado-color { color:#1a1a6e; }
    .l1-label.marca-color { color:#1565c0; }
    .l1-label.prod-color  { color:#1b5e20; }
    .row-right { display:flex; align-items:center; gap:10px; }

    .badge-dark  { background:#1a1a6e; color:#fff; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; }
    .badge-pesos { background:#e6f7ee; color:#00A650; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }
    .badge-units { background:#f0f0f0; color:#555; border-radius:20px; padding:3px 10px; font-size:11px; }

    .l1-body { display:none; }
    .l1-body.open { display:block; }

    /* Nivel 2 */
    .l2-row {
      padding:10px 18px 10px 34px; display:flex; align-items:center;
      justify-content:space-between; border-bottom:1px solid #f0f0f0;
      cursor:pointer; background:#fff;
    }
    .l2-row:hover { background:#fafafa; }
    .l2-label { font-size:13px; color:#333; display:flex; align-items:center; gap:8px; }
    .l2-right { display:flex; align-items:center; gap:10px; }

    .l2-body { display:none; background:#fafafa; border-bottom:1px solid #eee; overflow-x:auto; }
    .l2-body.open { display:block; }

    /* Tabla nivel 3 */
    table.t3 { width:100%; border-collapse:collapse; font-size:12px; }
    table.t3 th {
      padding:7px 14px 7px 50px; text-align:left;
      font-size:10px; text-transform:uppercase; color:#bbb;
      border-bottom:1px solid #eee; font-weight:500; white-space:nowrap;
    }
    table.t3 td { padding:9px 14px 9px 50px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    table.t3 tr:last-child td { border-bottom:none; }
    table.t3 tr:hover td { background:#f5f5f5; }

    .chip { background:#f0f2ff; color:#1a1a6e; border-radius:10px; padding:2px 7px; font-size:10px; margin-left:5px; }
    .arrow { display:inline-block; font-size:9px; transition:transform .2s; color:#bbb; }
    .arrow.open { transform:rotate(90deg); }
    .empty-msg { text-align:center; padding:40px; color:#ccc; font-size:13px; }

    /* ── MOBILE ── */
    @media (max-width:700px) {
      .body-layout { flex-direction:column; }
      .sidebar {
        width:100%; border-right:none; border-bottom:1px solid #eee;
        padding:12px 0 8px; display:flex; flex-direction:column;
        overflow-x:auto; overflow-y:hidden;
      }
      .sidebar-logo { display:none; }
      .sidebar-section { display:flex; gap:4px; padding:0 12px; }
      .sidebar-label { display:none; }
      .nav-item { padding:8px 14px; white-space:nowrap; }
      .sidebar-divider { display:none; }
      .filter-label { white-space:nowrap; }
      .filter-select { width:auto; min-width:120px; margin:0 8px; }
      .main { padding:14px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="Diente de León">
    <h2>Dashboard de Ventas</h2>
    <p>Ingresá tu PIN para acceder</p>
    <input type="password" id="pin-input" placeholder="••••" maxlength="8"
           onkeydown="if(event.key==='Enter') ingresar()">
    <button id="btn-login" onclick="ingresar()">Ingresar</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="topbar">
    <img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="Diente de León">
    <div class="topbar-info">
      <h1>Dashboard de Ventas</h1>
      <p id="txt-actualizado">—</p>
    </div>
    <button class="topbar-btn" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <div class="body-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="">
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Vista</div>
        <div class="nav-item active" id="nav-grado"   onclick="setVista('grado')">
          <span class="nav-icon">🎓</span> Grado
        </div>
        <div class="nav-item" id="nav-marca"   onclick="setVista('marca')">
          <span class="nav-icon">🏷️</span> Marca
        </div>
        <div class="nav-item" id="nav-producto" onclick="setVista('producto')">
          <span class="nav-icon">📦</span> Producto
        </div>
      </div>

      <hr class="sidebar-divider">

      <div class="sidebar-section">
        <div class="sidebar-label">Filtros</div>
      </div>
      <div class="filter-label">Mes</div>
      <select class="filter-select" id="filtro-mes" onchange="aplicarFiltros()">
        <option value="">Todos los meses</option>
      </select>
      <div class="filter-label">Grado</div>
      <select class="filter-select" id="filtro-grado" onchange="aplicarFiltros()">
        <option value="">Todos los grados</option>
      </select>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div id="loading-dash">Cargando datos…</div>

      <div class="cards" id="cards" style="display:none">
        <div class="card">
          <div class="card-label">Total recaudado</div>
          <div class="card-value" id="c-pesos">—</div>
        </div>
        <div class="card">
          <div class="card-label">Pedidos</div>
          <div class="card-value" id="c-pedidos">—</div>
        </div>
        <div class="card">
          <div class="card-label">Familias</div>
          <div class="card-value" id="c-familias">—</div>
        </div>
        <div class="card">
          <div class="card-label" id="c-dim-label">Grados</div>
          <div class="card-value" id="c-dim">—</div>
        </div>
      </div>

      <div class="section-card" id="chart-card" style="display:none">
        <div class="section-title" id="chart-title">Recaudación por grado <span>$ por mes</span></div>
        <canvas id="chart" style="max-height:260px"></canvas>
      </div>

      <div class="section-card" id="table-card" style="display:none; padding:0; overflow:hidden;">
        <div style="padding:14px 18px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between;">
          <div class="section-title" id="pivot-title" style="margin:0">Grado → Familia → Productos</div>
          <span style="font-size:11px;color:#aaa">Clic para expandir</span>
        </div>
        <div class="pivot-wrap" id="pivot-table"></div>
      </div>
    </div>

  </div>
</div>

<script>
var APPS_URL  = 'https://script.google.com/macros/s/AKfycbwt8mRYjjFZtsmFPw0JYcMpCkZcOt9J7ALFVkPByqQ8NM2NvCaYF1onagU_ag0a2ziksg/exec';
var PALETTE   = ['#a8c4e0','#b5d5c5','#c9b8d8','#f0c9a0','#aad4e8','#d4b8c7','#b8d4b8','#d4c9a8','#c4b8d8','#a8d4c4'];
var ALL_ROWS  = [];
var ALL_MESES = [];
var chartInst   = null;
var currentVista = 'grado';
var currentMes   = '';
var currentGrado = '';

// ── Mes actual por defecto ──
var _hoy  = new Date();
var _mesCorriente = _hoy.getFullYear() + '-' + ('0' + (_hoy.getMonth()+1)).slice(-2);

function normalizarGrado(g) {
  var s = String(g).trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if (s.indexOf('jard') !== -1) return 'Jardín';
  return String(g).trim();
}
function gradoIdx(g) {
  var s = String(g).trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if (s.indexOf('jard') !== -1) return 0;
  var m = s.match(/^(\d+)/);
  if (m) return parseInt(m[1]);
  return 99;
}
function sortGrados(arr) {
  return arr.slice().sort(function(a, b) {
    var ai = gradoIdx(a), bi = gradoIdx(b);
    return ai !== bi ? ai - bi : String(a).localeCompare(String(b), 'es');
  });
}

function pesos(n) {
  return '$ ' + Math.round(n || 0).toLocaleString('es-AR');
}
function mesLabel(m) {
  var p = m.split('-');
  var n = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return n[parseInt(p[1])] + ' ' + p[0].slice(2);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── LOGIN ──
function ingresar() {
  var pin = document.getElementById('pin-input').value.trim();
  if (!pin) {
    var err = document.getElementById('login-error');
    err.textContent = 'Ingresá tu PIN.'; err.style.display = 'block';
    return;
  }
  var btn = document.getElementById('btn-login');
  var err = document.getElementById('login-error');
  btn.textContent = 'Verificando…'; btn.disabled = true; err.style.display = 'none';

  fetch(APPS_URL + '?action=api_dashboard&pin=' + encodeURIComponent(pin), { redirect:'follow' })
    .then(function(r){ return r.json(); })
    .then(function(d){
      btn.textContent = 'Ingresar'; btn.disabled = false;
      if (d.ok) {
        document.getElementById('login').style.display    = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        initDashboard(d);
      } else {
        err.textContent = d.error || 'PIN incorrecto.'; err.style.display = 'block';
      }
    })
    .catch(function(){
      btn.textContent = 'Ingresar'; btn.disabled = false;
      err.textContent = 'Error de conexión. Intentá de nuevo.'; err.style.display = 'block';
    });
}

function cerrarSesion() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('pin-input').value = '';
}

// ── INIT ──
function initDashboard(d) {
  document.getElementById('loading-dash').style.display = 'none';
  document.getElementById('txt-actualizado').textContent = 'Actualizado: ' + (d.actualizado||'');

  ALL_ROWS  = (d.rows || []).map(function(r){ r.grado = normalizarGrado(r.grado); return r; });
  ALL_MESES = d.meses_todos || [];

  // Poblar selector de meses
  var sel = document.getElementById('filtro-mes');
  ALL_MESES.forEach(function(m){
    var opt = document.createElement('option');
    opt.value = m; opt.textContent = mesLabel(m);
    if (m === _mesCorriente) opt.selected = true;
    sel.appendChild(opt);
  });
  currentMes = sel.value;

  // Poblar selector de grados (orden Jardín → 1 → 12)
  var gradosSet = {};
  ALL_ROWS.forEach(function(r){ if (r.grado) gradosSet[r.grado] = true; });
  var selG = document.getElementById('filtro-grado');
  sortGrados(Object.keys(gradosSet)).forEach(function(g){
    var opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    selG.appendChild(opt);
  });

  document.getElementById('cards').style.display    = 'grid';
  document.getElementById('chart-card').style.display = 'block';
  document.getElementById('table-card').style.display = 'block';

  render();
}

// ── CONTROLES ──
function setVista(v) {
  currentVista = v;
  ['grado','marca','producto'].forEach(function(x){
    document.getElementById('nav-' + x).classList.toggle('active', x === v);
  });
  render();
}

function aplicarFiltros() {
  currentMes   = document.getElementById('filtro-mes').value;
  currentGrado = document.getElementById('filtro-grado').value;
  render();
}

// ── RENDER ──
function render() {
  var rows = ALL_ROWS;
  if (currentMes)   rows = rows.filter(function(r){ return r.mes   === currentMes;   });
  if (currentGrado) rows = rows.filter(function(r){ return r.grado === currentGrado; });

  updateCards(rows);
  updateChart(rows);
  updatePivot(rows);
}

// ── CARDS ──
function updateCards(rows) {
  var totalPesos = 0, pedidosSet = {}, familiasSet = {}, dimSet = {};
  rows.forEach(function(r){
    totalPesos += r.total_linea;
    if (r.pedido) pedidosSet[r.pedido] = true;
    familiasSet[r.familia] = true;
    var dim = currentVista === 'grado' ? r.grado : currentVista === 'marca' ? r.marca : r.producto;
    dimSet[dim] = true;
  });
  var labels = { grado:'Grados', marca:'Marcas', producto:'Productos' };
  document.getElementById('c-pesos').textContent    = pesos(totalPesos);
  document.getElementById('c-pedidos').textContent  = Object.keys(pedidosSet).length;
  document.getElementById('c-familias').textContent = Object.keys(familiasSet).length;
  document.getElementById('c-dim-label').textContent = labels[currentVista];
  document.getElementById('c-dim').textContent      = Object.keys(dimSet).length;
}

// ── CHART ──
function updateChart(rows) {
  var titles = { grado:'Recaudación por grado', marca:'Ranking por marca', producto:'Ranking por producto' };
  document.getElementById('chart-title').innerHTML = titles[currentVista] +
    (currentVista === 'grado' ? ' <span>$ por mes</span>' : ' <span>$ total, mayor a menor</span>');

  if (currentVista === 'grado') {
    _chartGrado(rows);
  } else {
    _chartHistograma(rows);
  }
}

// Grado: multi-serie por mes (orden Jardín→12)
function _chartGrado(rows) {
  var meses = currentMes ? [currentMes] : ALL_MESES;
  var serieMap = {}, serieOrder = [];
  rows.forEach(function(r){
    if (!serieMap[r.grado]) { serieMap[r.grado] = {}; serieOrder.push(r.grado); }
    serieMap[r.grado][r.mes] = (serieMap[r.grado][r.mes]||0) + r.total_linea;
  });
  serieOrder = sortGrados(serieOrder);
  var datasets = serieOrder.map(function(g, i){
    return {
      label: g,
      data:  meses.map(function(m){ return Math.round(serieMap[g][m]||0); }),
      backgroundColor: PALETTE[i % PALETTE.length],
      borderRadius: 4, borderSkipped: false
    };
  });
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'bar',
    data: { labels: meses.map(function(m){ return currentMes ? 'Mes actual' : mesLabel(m); }), datasets: datasets },
    options: {
      responsive: true,
      plugins: { legend: { position:'bottom', labels:{ boxWidth:10, font:{size:11} } } },
      scales: {
        x: { grid:{ display:false } },
        y: { beginAtZero:true, ticks:{ callback: function(v){ return '$'+v.toLocaleString('es-AR'); } } }
      }
    }
  });
}

// Marca/Producto: histograma ordenado de mayor a menor $
function _chartHistograma(rows) {
  var dimFn = currentVista === 'marca'
    ? function(r){ return r.marca || '(sin marca)'; }
    : function(r){ return r.producto; };

  var totals = {};
  rows.forEach(function(r){
    var d = dimFn(r);
    totals[d] = (totals[d]||0) + r.total_linea;
  });
  var dims = Object.keys(totals).sort(function(a,b){ return totals[b]-totals[a]; });

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: dims,
      datasets: [{
        label: 'Recaudación',
        data:  dims.map(function(d){ return Math.round(totals[d]); }),
        backgroundColor: dims.map(function(_, i){ return PALETTE[i % PALETTE.length]; }),
        borderRadius: 4, borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'x',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid:{ display:false }, ticks:{ maxRotation:90, minRotation:90, font:{size:11} } },
        y: { beginAtZero:true, ticks:{ callback: function(v){ return '$'+v.toLocaleString('es-AR'); } } }
      }
    }
  });
}

// ── PIVOT ──
function updatePivot(rows) {
  if (!rows.length) {
    document.getElementById('pivot-table').innerHTML = '<div class="empty-msg">Sin datos para los filtros seleccionados.</div>';
    return;
  }

  var html = '';
  if      (currentVista === 'grado')   html = pivotGrado(rows);
  else if (currentVista === 'marca')   html = pivotMarca(rows);
  else                                  html = pivotProducto(rows);

  document.getElementById('pivot-table').innerHTML = html;

  // Si hay filtro de grado activo, expandir todo por defecto
  if (currentGrado) {
    document.querySelectorAll('.l1-body, .l2-body').forEach(function(el){ el.classList.add('open'); });
    document.querySelectorAll('.arrow').forEach(function(el){ el.classList.add('open'); });
  }

  var subtitles = {
    grado:   'Grado → Familia → Productos',
    marca:   'Marca → Producto → Familias',
    producto:'Producto → Familias'
  };
  document.getElementById('pivot-title').innerHTML = subtitles[currentVista];
}

// ── Vista GRADO ──
function pivotGrado(rows) {
  var map = {}; var order = [];
  rows.forEach(function(r){
    var g = r.grado;
    if (!map[g]) { map[g] = { total_pesos:0, total_un:0, familias:{} }; order.push(g); }
    map[g].total_pesos += r.total_linea; map[g].total_un += r.cantidad;
    if (!map[g].familias[r.familia]) map[g].familias[r.familia] = { email:r.email, total_pesos:0, total_un:0, prods:[] };
    var f = map[g].familias[r.familia];
    f.total_pesos += r.total_linea; f.total_un += r.cantidad;
    f.prods.push(r);
  });
  order = sortGrados(order);
  var html = '';
  order.forEach(function(g, gi){
    var gd = map[g]; var bid = 'g'+gi;
    html += l1row(bid,'grado-color',g,gd.total_un,gd.total_pesos);
    html += '<div class="l1-body" id="b-'+bid+'">';
    var fams = Object.keys(gd.familias).sort(function(a,b){ return gd.familias[b].total_pesos-gd.familias[a].total_pesos; });
    fams.forEach(function(f,fi){
      var fd = gd.familias[f]; var fid = bid+'f'+fi;
      html += l2row(fid,f,fd.total_un,fd.total_pesos);
      html += '<div class="l2-body" id="b-'+fid+'">';
      html += '<table class="t3"><thead><tr><th>Producto</th><th style="text-align:center">Cant.</th><th style="text-align:right">Subtotal</th><th>Pedido</th><th>Fecha</th></tr></thead><tbody>';
      fd.prods.forEach(function(p){
        html += '<tr><td>'+esc(p.producto)+(p.marca?'<span class="chip">'+esc(p.marca)+'</span>':'')+'</td>';
        html += '<td style="text-align:center;font-weight:700">'+p.cantidad+'</td>';
        html += '<td style="text-align:right;color:#00A650;font-weight:600">'+pesos(p.total_linea)+'</td>';
        html += '<td style="color:#aaa">#'+esc(String(p.pedido))+'</td>';
        html += '<td style="color:#aaa;white-space:nowrap">'+esc(p.fecha)+'</td></tr>';
      });
      html += '</tbody></table></div>';
    });
    html += '</div>';
  });
  return html;
}

// ── Vista MARCA ──
function pivotMarca(rows) {
  var map = {}; var order = [];
  rows.forEach(function(r){
    var m = r.marca || '(sin marca)';
    if (!map[m]) { map[m] = { total_pesos:0, total_un:0, prods:{} }; order.push(m); }
    map[m].total_pesos += r.total_linea; map[m].total_un += r.cantidad;
    var pk = r.producto;
    if (!map[m].prods[pk]) map[m].prods[pk] = { total_pesos:0, total_un:0, familias:[] };
    var p = map[m].prods[pk];
    p.total_pesos += r.total_linea; p.total_un += r.cantidad;
    p.familias.push(r);
  });
  order.sort();
  var html = '';
  order.forEach(function(m, mi){
    var md = map[m]; var bid = 'm'+mi;
    html += l1row(bid,'marca-color',m,md.total_un,md.total_pesos);
    html += '<div class="l1-body" id="b-'+bid+'">';
    var prods = Object.keys(md.prods).sort(function(a,b){ return md.prods[b].total_pesos-md.prods[a].total_pesos; });
    prods.forEach(function(p,pi){
      var pd = md.prods[p]; var pid = bid+'p'+pi;
      html += l2row(pid,p,pd.total_un,pd.total_pesos);
      html += '<div class="l2-body" id="b-'+pid+'">';
      html += '<table class="t3"><thead><tr><th>Familia</th><th>Grado</th><th style="text-align:center">Cant.</th><th style="text-align:right">Subtotal</th><th>Pedido</th></tr></thead><tbody>';
      pd.familias.forEach(function(r){
        html += '<tr><td><strong>'+esc(r.familia)+'</strong><br><span style="color:#aaa;font-size:10px">'+esc(r.email)+'</span></td>';
        html += '<td style="color:#777;font-size:12px">'+esc(r.grado)+'</td>';
        html += '<td style="text-align:center;font-weight:700">'+r.cantidad+'</td>';
        html += '<td style="text-align:right;color:#00A650;font-weight:600">'+pesos(r.total_linea)+'</td>';
        html += '<td style="color:#aaa">#'+esc(String(r.pedido))+'</td></tr>';
      });
      html += '</tbody></table></div>';
    });
    html += '</div>';
  });
  return html;
}

// ── Vista PRODUCTO ──
function pivotProducto(rows) {
  var map = {}; var order = [];
  rows.forEach(function(r){
    var pk = r.producto;
    if (!map[pk]) { map[pk] = { marca:r.marca, total_pesos:0, total_un:0, familias:[] }; order.push(pk); }
    map[pk].total_pesos += r.total_linea; map[pk].total_un += r.cantidad;
    map[pk].familias.push(r);
  });
  order.sort(function(a,b){ return map[b].total_pesos-map[a].total_pesos; });
  var html = '';
  order.forEach(function(p, pi){
    var pd = map[p]; var bid = 'p'+pi;
    var label = p + (pd.marca ? ' <span class="chip">'+esc(pd.marca)+'</span>' : '');
    html += l1row(bid,'prod-color',label,pd.total_un,pd.total_pesos);
    html += '<div class="l1-body" id="b-'+bid+'">';
    html += '<table class="t3"><thead><tr><th>Familia</th><th>Grado</th><th style="text-align:center">Cant.</th><th style="text-align:right">Subtotal</th><th>Pedido</th><th>Fecha</th></tr></thead><tbody>';
    pd.familias.forEach(function(r){
      html += '<tr><td><strong>'+esc(r.familia)+'</strong><br><span style="color:#aaa;font-size:10px">'+esc(r.email)+'</span></td>';
      html += '<td style="color:#777;font-size:12px">'+esc(r.grado)+'</td>';
      html += '<td style="text-align:center;font-weight:700">'+r.cantidad+'</td>';
      html += '<td style="text-align:right;color:#00A650;font-weight:600">'+pesos(r.total_linea)+'</td>';
      html += '<td style="color:#aaa">#'+esc(String(r.pedido))+'</td>';
      html += '<td style="color:#aaa;white-space:nowrap">'+esc(r.fecha)+'</td></tr>';
    });
    html += '</tbody></table></div>';
  });
  return html;
}

// ── Helpers HTML ──
function l1row(bid, colorClass, label, units, pesosVal) {
  return '<div class="l1-row '+colorClass+'" onclick="toggleL(\''+bid+'\')">'
    + '<span class="l1-label '+colorClass+'"><span class="arrow" id="a-'+bid+'">&#9654;</span> '+label+'</span>'
    + '<span class="row-right">'
    + '<span class="badge-units">'+units+' un.</span>'
    + '<span class="badge-pesos">'+pesos(pesosVal)+'</span>'
    + '</span></div>';
}
function l2row(fid, label, units, pesosVal) {
  return '<div class="l2-row" onclick="toggleL(\''+fid+'\')">'
    + '<span class="l2-label"><span class="arrow" id="a-'+fid+'">&#9654;</span> '+esc(label)+'</span>'
    + '<span class="l2-right">'
    + '<span class="badge-units">'+units+' un.</span>'
    + '<span class="badge-pesos">'+pesos(pesosVal)+'</span>'
    + '</span></div>';
}

function toggleL(id) {
  var el  = document.getElementById('b-'+id);
  var arr = document.getElementById('a-'+id);
  if (!el) return;
  var open = !el.classList.contains('open');
  el.classList.toggle('open', open);
  if (arr) arr.classList.toggle('open', open);
}
</script>
