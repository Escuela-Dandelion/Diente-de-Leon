<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Referentes — Diente de León</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a1a; }

    /* ── LOGIN ── */
    #login { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .login-card {
      background:#fff; border-radius:20px; padding:40px 32px; width:100%; max-width:360px;
      box-shadow:0 4px 24px rgba(0,0,0,.08); text-align:center;
    }
    .login-card img  { max-width:140px; margin-bottom:28px; }
    .login-card h2   { font-size:20px; color:#1a1a6e; margin-bottom:6px; }
    .login-card p    { font-size:14px; color:#888; margin-bottom:28px; }
    .login-card input {
      width:100%; padding:16px; border:1.5px solid #e0e0e0; border-radius:12px;
      font-size:22px; text-align:center; letter-spacing:6px; margin-bottom:12px;
      outline:none; transition:border-color .2s;
    }
    .login-card input:focus { border-color:#1a1a6e; }
    .login-card button {
      width:100%; padding:16px; background:#1a1a6e; color:#fff; border:none;
      border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
    }
    .login-card button:hover    { background:#2d2d8e; }
    .login-card button:disabled { background:#aaa; cursor:not-allowed; }
    #login-error { color:#e63946; font-size:13px; margin-top:10px; display:none; }

    /* ── LAYOUT ── */
    #dashboard { display:none; height:100vh; flex-direction:column; }
    .topbar {
      background:#fff; border-bottom:1px solid #eee; padding:12px 20px;
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .topbar img      { height:34px; }
    .topbar-info h1  { font-size:15px; color:#1a1a6e; font-weight:700; }
    .topbar-info p   { font-size:11px; color:#aaa; }
    .topbar-actions  { display:flex; align-items:center; gap:8px; }
    .topbar-btn {
      background:none; border:1px solid #ddd; border-radius:8px;
      padding:6px 14px; font-size:13px; cursor:pointer; color:#555;
      text-decoration:none; display:inline-flex; align-items:center; gap:5px;
    }
    .topbar-btn:hover { background:#f4f6f9; }
    .topbar-btn.primary { background:#1a1a6e; color:#fff; border-color:#1a1a6e; }
    .topbar-btn.primary:hover { background:#2d2d8e; }
    .topbar-btn.pdf { background:#2e7d32; color:#fff; border-color:#2e7d32; }
    .topbar-btn.pdf:hover { background:#1b5e20; }

    .body-layout { display:flex; flex:1; overflow:hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width:220px; background:#fff; border-right:1px solid #eee;
      overflow-y:auto; flex-shrink:0; padding:20px 0;
    }
    .sidebar-logo { padding:0 16px 20px; border-bottom:1px solid #f0f0f0; margin-bottom:16px; }
    .sidebar-logo img { max-width:120px; }
    .sidebar-section  { padding:0 16px 8px; }
    .sidebar-label    { font-size:10px; font-weight:700; color:#bbb; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .sidebar-divider  { border:none; border-top:1px solid #f0f0f0; margin:12px 0; }
    .filter-label  { font-size:12px; color:#888; margin-bottom:6px; padding:0 16px; }
    .filter-select {
      width:calc(100% - 32px); margin:0 16px 12px; padding:8px 10px;
      border:1px solid #e0e0e0; border-radius:8px; font-size:13px;
      background:#fff; cursor:pointer; outline:none;
    }
    .filter-select:focus { border-color:#1a1a6e; }
    .grado-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:9px 12px; margin:0 8px 2px; border-radius:10px;
      cursor:pointer; font-size:13px; color:#555; transition:background .15s;
    }
    .grado-item:hover  { background:#f4f6f9; }
    .grado-item.active { background:#f0f2ff; color:#1a1a6e; font-weight:600; }
    .grado-badge { background:#e8eaff; color:#1a1a6e; border-radius:10px; padding:1px 7px; font-size:10px; font-weight:700; }
    .grado-item.active .grado-badge { background:#1a1a6e; color:#fff; }

    /* ── MAIN ── */
    .main { flex:1; overflow-y:auto; padding:24px; }
    #loading-dash { text-align:center; padding:80px; color:#aaa; font-size:15px; }
    .empty-state { text-align:center; padding:60px 20px; color:#bbb; }
    .empty-state .icon { font-size:48px; margin-bottom:12px; }

    /* Header de grado */
    .grado-header {
      background:#fff; border-radius:12px; border:1px solid #eee;
      padding:18px 20px; margin-bottom:20px;
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
    }
    .grado-titulo    { font-size:20px; font-weight:700; color:#1a1a6e; }
    .grado-subtitulo { font-size:13px; color:#aaa; margin-top:2px; }
    .grado-total     { font-size:22px; font-weight:700; color:#2e7d32; }

    /* Cards */
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:24px; }
    .card {
      background:#fff; border-radius:10px; padding:12px 14px;
      border:1px solid #e8eaed; border-left:3px solid #c0c4cc;
      box-shadow:0 1px 3px rgba(0,0,0,.04);
    }
    .card-label { font-size:9px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
    .card-value { font-size:20px; font-weight:700; color:#333; line-height:1; }
    .card-sub   { font-size:10px; color:#aaa; margin-top:4px; }

    .card.purple { border-left-color:#7c3aed; background:#faf5ff; }
    .card.purple .card-label { color:#7c3aed; }
    .card.purple .card-value { color:#7c3aed; }

    .card.teal { border-left-color:#0891b2; background:#f0f9ff; }
    .card.teal .card-label { color:#0891b2; }
    .card.teal .card-value { color:#0891b2; }

    .card.green { border-left-color:#059669; background:#f0fdf4; }
    .card.green .card-label { color:#059669; }
    .card.green .card-value { color:#059669; }

    .card.orange { border-left-color:#d97706; background:#fffbeb; }
    .card.orange .card-label { color:#d97706; }
    .card.orange .card-value { color:#d97706; }

    /* View toggle */
    .view-toggle { display:flex; gap:0; border:1px solid #e0e0e0; border-radius:8px; overflow:hidden; margin-bottom:20px; width:fit-content; }
    .view-btn {
      padding:8px 18px; font-size:13px; cursor:pointer; border:none;
      background:#fff; color:#555; font-weight:500; transition:background .15s;
    }
    .view-btn:hover { background:#f4f6f9; }
    .view-btn.active { background:#1a1a6e; color:#fff; }
    .view-btn + .view-btn { border-left:1px solid #e0e0e0; }

    /* Section card */
    .section-card { background:#fff; border-radius:12px; border:1px solid #eee; margin-bottom:20px; overflow:hidden; }
    .section-head { padding:14px 18px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; }
    .section-title { font-size:14px; font-weight:700; color:#1a1a6e; }
    .section-title span { font-size:12px; font-weight:400; color:#aaa; margin-left:6px; }
    .section-count { font-size:11px; color:#aaa; }

    /* Badges */
    .badge-pesos { background:#e6f7ee; color:#00A650; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }
    .badge-units { background:#f0f0f0; color:#555; border-radius:20px; padding:3px 10px; font-size:11px; }
    .arrow { font-size:10px; color:#bbb; transition:transform .2s; display:inline-block; flex-shrink:0; }
    .arrow.open { transform:rotate(90deg); }

    /* ── VISTA POR FAMILIA ── */
    .fam-row {
      padding:13px 18px; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; border-bottom:1px solid #eef0ff; user-select:none;
      background:#f7f8ff; transition:background .15s;
    }
    .fam-row:hover { background:#eef0ff; }
    .fam-left { display:flex; align-items:center; gap:10px; }
    .fam-name  { font-weight:700; font-size:14px; color:#1a1a6e; }
    .fam-email { font-size:11px; color:#aaa; }
    .fam-right { display:flex; align-items:center; gap:8px; }
    .fam-body  { display:none; background:#fff; border-bottom:1px solid #eee; overflow-x:auto; }
    .fam-body.open { display:block; }

    /* ── VISTA POR PRODUCTO ── */
    .prod-row {
      padding:13px 18px; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; border-bottom:1px solid #eef4ee; user-select:none;
      background:#f7fff8; transition:background .15s;
    }
    .prod-row:hover { background:#edf7ee; }
    .prod-left  { display:flex; align-items:center; gap:10px; }
    .prod-name  { font-weight:700; font-size:14px; color:#1b5e20; }
    .prod-marca { font-size:11px; color:#aaa; }
    .prod-right { display:flex; align-items:center; gap:8px; }
    .prod-body  { display:none; background:#fff; border-bottom:1px solid #eee; overflow-x:auto; }
    .prod-body.open { display:block; }
    .badge-units-g { background:#e8f5e9; color:#2e7d32; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }

    /* Tablas internas */
    table.tbl-inner { width:100%; border-collapse:collapse; font-size:12px; }
    table.tbl-inner th {
      padding:8px 14px 8px 48px; text-align:left; font-size:10px;
      text-transform:uppercase; color:#bbb; border-bottom:1px solid #eee;
      font-weight:600; white-space:nowrap;
    }
    table.tbl-inner th.num { text-align:right; padding-left:8px; }
    table.tbl-inner td { padding:10px 14px 10px 48px; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
    table.tbl-inner td.num { text-align:right; padding-left:8px; font-variant-numeric:tabular-nums; }
    table.tbl-inner tr:last-child td { border-bottom:none; }
    table.tbl-inner tr:hover td { background:#fafafa; }
    .chip { background:#f0f2ff; color:#1a1a6e; border-radius:8px; padding:2px 7px; font-size:10px; }
    .chip-g { background:#e8f5e9; color:#2e7d32; border-radius:8px; padding:2px 7px; font-size:10px; }
    .txt-sm { font-size:11px; color:#aaa; white-space:nowrap; }

    /* ── MOBILE ── */
    @media (max-width:700px) {
      /* Topbar: logo + botones compactos, título oculto */
      .topbar { padding:8px 12px; flex-wrap:nowrap; gap:6px; }
      .topbar img { height:30px; flex-shrink:0; }
      .topbar-info { display:none; }
      .topbar-actions { gap:6px; }
      .topbar-btn { padding:6px 10px; font-size:12px; gap:3px; }

      /* Sidebar → columna compacta */
      .body-layout { flex-direction:column; }
      .sidebar {
        width:100%; border-right:none; border-bottom:1px solid #eee;
        padding:10px 0 0; overflow:hidden; flex-shrink:0;
      }
      .sidebar-logo    { display:none; }
      .sidebar-divider { display:none; }
      .sidebar-section { padding:0 14px 4px; }
      .sidebar-label   { font-size:9px; }

      /* Filtro mes: ancho completo */
      .filter-label  { padding:0 14px; font-size:11px; }
      .filter-select { width:calc(100% - 28px); margin:0 14px 10px; }

      /* Grados → chips horizontales scrolleables */
      #grados-nav {
        display:flex !important;
        flex-direction:row !important;
        flex-wrap:nowrap;
        gap:6px;
        padding:6px 14px 12px;
        overflow-x:auto;
        overflow-y:hidden;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
      }
      #grados-nav::-webkit-scrollbar { display:none; }
      .grado-item {
        flex-shrink:0 !important;
        white-space:nowrap;
        padding:6px 12px !important;
        margin:0 !important;
        border-radius:20px !important;
        border:1.5px solid #ddd;
        background:#fff;
        font-size:12px;
        width:auto !important;
        justify-content:center;
      }
      .grado-item.active { background:#1a1a6e; border-color:#1a1a6e; color:#fff; }
      .grado-item.active .grado-badge { background:rgba(255,255,255,.2); color:#fff; }
      .grado-badge { font-size:10px; padding:1px 5px; }

      /* Main y cards */
      .main { padding:12px; }
      .cards { grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
      .card  { padding:10px 12px; }
      .card-value { font-size:18px; }
      .card-label { font-size:9px; }

      /* Vista toggle */
      .view-toggle { width:100%; margin-bottom:14px; }
      .view-btn { flex:1; justify-content:center; }

      /* Header grado */
      .grado-header { padding:12px 14px; gap:8px; }
      .grado-titulo { font-size:16px; }
      .grado-total  { font-size:18px; }

      /* Tablas */
      table.tbl-inner th, table.tbl-inner td { padding-left:14px; }
      table.tbl-inner th { font-size:9px; }
      .fam-row, .prod-row { padding:11px 14px; }
      .fam-name, .prod-name { font-size:13px; }
    }

    /* ── PRINT / PDF ── */
    #print-area { display:none; }

    @media print {
      * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      body { background:#fff !important; }
      #login, #dashboard { display:none !important; }
      #print-area {
        display:block !important;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color:#1a1a1a; padding:24px; font-size:12px;
      }

      .print-header {
        display:flex; align-items:center; justify-content:space-between;
        border-bottom:2px solid #1a1a6e; padding-bottom:14px; margin-bottom:20px;
      }
      .print-header img { height:50px; }
      .print-header-info h1 { font-size:18px; font-weight:700; color:#1a1a6e; }
      .print-header-info p  { font-size:11px; color:#666; margin-top:3px; }
      .print-header-date    { font-size:11px; color:#999; text-align:right; }

      .print-section { margin-bottom:28px; }
      .print-section-title {
        font-size:13px; font-weight:700; color:#1a1a6e;
        border-bottom:1px solid #eee; padding-bottom:6px; margin-bottom:10px;
        text-transform:uppercase; letter-spacing:.5px;
      }

      table.print-tbl { width:100%; border-collapse:collapse; font-size:11px; }
      table.print-tbl th {
        background:#f0f2ff; color:#1a1a6e; padding:7px 10px;
        text-align:left; font-size:10px; text-transform:uppercase;
        border:1px solid #e0e0e0; font-weight:700;
      }
      table.print-tbl th.num { text-align:right; }
      table.print-tbl td { padding:7px 10px; border:1px solid #e8e8e8; vertical-align:top; }
      table.print-tbl td.num { text-align:right; font-variant-numeric:tabular-nums; }
      table.print-tbl tr:nth-child(even) td { background:#fafafa; }
      table.print-tbl tr.total-row td { background:#e8f5e9; font-weight:700; }

      .print-retiro-box {
        background:#f0f2ff; border:1px solid #c5caf5; border-radius:6px;
        padding:10px 14px; margin-bottom:20px;
        font-size:12px; color:#1a1a6e;
      }
      .print-retiro-box strong { font-size:13px; }
      .page-break { page-break-after:always; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="Diente de León">
    <h2>Dashboard Referentes</h2>
    <p>Ingresá tu PIN para acceder</p>
    <input type="password" id="pin-input" placeholder="••••" maxlength="8"
           onkeydown="if(event.key==='Enter') ingresar()">
    <button id="btn-login" onclick="ingresar()">Ingresar</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="Diente de León">
    <div class="topbar-info">
      <h1>Dashboard Referentes — Diente de León</h1>
      <p id="txt-actualizado">—</p>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn pdf" id="btn-pdf" onclick="exportarPDF()" style="display:none">⬇ Exportar PDF</button>
      <a href="dashboard-general.html" class="topbar-btn primary">↗ Ver general</a>
      <button class="topbar-btn" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>

  <div class="body-layout">
    <div class="sidebar">
      <div class="sidebar-logo">
        <img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="">
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Filtros</div>
      </div>
      <div class="filter-label">Mes</div>
      <!-- En desktop: select normal. En mobile: dentro de .mobile-mes-row -->
      <select class="filter-select" id="filtro-mes" onchange="aplicarFiltros()">
        <option value="">Todos los meses</option>
      </select>
      <hr class="sidebar-divider">
      <div class="sidebar-section">
        <div class="sidebar-label">Grado <span style="font-size:9px;font-weight:400;color:#ccc;letter-spacing:0">· tap para seleccionar</span></div>
      </div>
      <div id="grados-nav"></div>
    </div>

    <div class="main">
      <div id="loading-dash">Cargando datos…</div>
      <div id="contenido" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ÁREA DE IMPRESIÓN (oculta en pantalla, visible solo al imprimir) -->
<div id="print-area"></div>

<script>
var APPS_URL  = 'https://script.google.com/macros/s/AKfycbwt8mRYjjFZtsmFPw0JYcMpCkZcOt9J7ALFVkPByqQ8NM2NvCaYF1onagU_ag0a2ziksg/exec';
var ALL_ROWS  = [];
var ALL_MESES = [];
var currentMes    = '';
var selectedGrados = []; // [] = todos
var currentVista  = 'familia'; // 'familia' | 'producto'

var _hoy = new Date();
var _mesCorriente = _hoy.getFullYear() + '-' + ('0' + (_hoy.getMonth()+1)).slice(-2);

var _GRADE_SUFFIX = {1:'ro',2:'do',3:'er',4:'to',5:'to',6:'to',7:'mo',8:'vo',9:'no',10:'mo',11:'vo',12:'vo'};
function canonicalGrade(n){ return n+(_GRADE_SUFFIX[n]||'vo'); }
function normalizarGrado(g){
  var s=String(g||'').trim(); if(!s) return 'Otros';
  var l=s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(l.indexOf('jard')!==-1) return 'Jardín';
  var T={'primer':1,'primero':1,'segundo':2,'tercer':3,'tercero':3,'cuarto':4,'quinto':5,
         'sexto':6,'septimo':7,'setimo':7,'octavo':8,'noveno':9,'decimo':10,
         'undecimo':11,'decimoprimero':11,'duodecimo':12,'decimosegundo':12};
  for(var k in T){ if(l.indexOf(k)!==-1) return canonicalGrade(T[k]); }
  var m=l.match(/^(\d+)/);
  if(m){ var n=parseInt(m[1]); if(n>=1&&n<=12){
    var r=l.slice(m[0].length).replace(/^(ro|do|er|to|vo|mo|no|°)/,'').replace(/^\s*(grado|año|de)?\s*$/,'').trim();
    if(!r) return canonicalGrade(n);
  }}
  return 'Otros';
}
function gradoIdx(g){
  var s=String(g).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(s.indexOf('jard')!==-1) return 0; if(g==='Otros') return 100;
  var m=s.match(/^(\d+)/); return m?parseInt(m[1]):100;
}
function sortGrados(arr){
  return arr.slice().sort(function(a,b){ var ai=gradoIdx(a),bi=gradoIdx(b); return ai!==bi?ai-bi:String(a).localeCompare(String(b),'es'); });
}
function pesos(n)    { return '$ '+Math.round(n||0).toLocaleString('es-AR'); }
function pesosCard(n){ var v=Math.round(n||0); if(v>=1000000) return '$ '+(v/1000000).toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1})+'M'; if(v>=1000) return '$ '+(v/1000).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:1})+'K'; return '$ '+v.toLocaleString('es-AR'); }
function mesLabel(m) { var p=m.split('-'),n=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return n[parseInt(p[1])]+' '+p[0].slice(2); }
function esc(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hoy()       { return _hoy.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }

// ── SESIÓN (24hs en localStorage, compartida con dashboard-general) ──
var SESSION_KEY = 'dl_pin';
var SESSION_TTL = 24 * 60 * 60 * 1000;
function guardarSesion(pin){ localStorage.setItem(SESSION_KEY, JSON.stringify({pin:pin, ts:Date.now()})); }
function leerSesion()      { try{ var s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); return s&&(Date.now()-s.ts)<SESSION_TTL?s.pin:null; }catch(e){ return null; } }
function borrarSesion()    { localStorage.removeItem(SESSION_KEY); }

// ── LOGIN ──
function ingresar(){
  var pin=document.getElementById('pin-input').value.trim();
  if(!pin){ showErr('Ingresá tu PIN.'); return; }
  _doLogin(pin, true);
}
function _doLogin(pin, guardar){
  var btn=document.getElementById('btn-login');
  if(btn){ btn.textContent='Verificando…'; btn.disabled=true; }
  hideErr();
  fetch(APPS_URL+'?action=api_dashboard&pin='+encodeURIComponent(pin),{redirect:'follow'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(btn){ btn.textContent='Ingresar'; btn.disabled=false; }
      if(d.ok){
        if(guardar) guardarSesion(pin);
        document.getElementById('login').style.display='none';
        document.getElementById('dashboard').style.display='flex';
        initDashboard(d);
      } else { borrarSesion(); showErr(d.error||'PIN incorrecto.'); }
    })
    .catch(function(){ if(btn){ btn.textContent='Ingresar'; btn.disabled=false; } showErr('Error de conexión.'); });
}
function cerrarSesion(){ borrarSesion(); document.getElementById('dashboard').style.display='none'; document.getElementById('login').style.display='flex'; document.getElementById('pin-input').value=''; }
function showErr(msg){ var e=document.getElementById('login-error'); e.textContent=msg; e.style.display='block'; }
function hideErr()   { document.getElementById('login-error').style.display='none'; }

// ── AUTO-LOGIN al cargar ──
window.addEventListener('load', function(){
  // Si hay sesión Google del admin, bypasear PIN
  try {
    var adminSession = JSON.parse(localStorage.getItem('dl_admin_session') || 'null');
    if (adminSession && adminSession.email && Date.now() < adminSession.expires) {
      fetch(APPS_URL+'?action=api_dashboard&email='+encodeURIComponent(adminSession.email),{redirect:'follow'})
        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d.ok){
            document.getElementById('login').style.display='none';
            document.getElementById('dashboard').style.display='flex';
            initDashboard(d);
          }
        }).catch(function(){});
      return;
    }
  } catch(e) {}
  // Fallback: PIN session
  var pin=leerSesion();
  if(pin) _doLogin(pin, false);
});

// ── INIT ──
function initDashboard(d){
  document.getElementById('loading-dash').style.display='none';
  document.getElementById('txt-actualizado').textContent='Actualizado: '+(d.actualizado||'');
  ALL_ROWS  = (d.rows||[]).map(function(r){ r.grado=normalizarGrado(r.grado); return r; });
  ALL_MESES = d.meses_todos||[];

  var sel=document.getElementById('filtro-mes');
  ALL_MESES.forEach(function(m){
    var opt=document.createElement('option');
    opt.value=m; opt.textContent=mesLabel(m);
    if(m===_mesCorriente) opt.selected=true;
    sel.appendChild(opt);
  });
  currentMes=sel.value;

  var gradosMap={};
  ALL_ROWS.forEach(function(r){ gradosMap[r.grado]=(gradosMap[r.grado]||0)+1; });
  var grados=sortGrados(Object.keys(gradosMap));
  var nav=document.getElementById('grados-nav');

  // "Todos los grados" primero
  var divTodos=document.createElement('div');
  divTodos.id='nav-todos';
  divTodos.className='grado-item active';
  divTodos.innerHTML='<span>Todos los grados</span><span class="grado-badge">'+ALL_ROWS.length+'</span>';
  divTodos.onclick=function(){ toggleGrado(null); };
  nav.appendChild(divTodos);

  grados.forEach(function(g){
    var div=document.createElement('div');
    div.className='grado-item';
    div.dataset.grado=g;
    div.innerHTML='<span>'+esc(g)+'</span><span class="grado-badge">'+gradosMap[g]+'</span>';
    div.onclick=function(){ toggleGrado(g); };
    nav.appendChild(div);
  });
  selectedGrados=[];
  document.getElementById('contenido').style.display='block';
  render();
}

function toggleGrado(g){
  if(g===null){
    // Todos los grados
    selectedGrados=[];
  } else {
    var idx=selectedGrados.indexOf(g);
    if(idx===-1) selectedGrados.push(g);
    else         selectedGrados.splice(idx,1);
  }
  // Actualizar clases activas
  var todos=document.getElementById('nav-todos');
  if(todos) todos.classList.toggle('active', selectedGrados.length===0);
  document.querySelectorAll('.grado-item[data-grado]').forEach(function(el){
    el.classList.toggle('active', selectedGrados.indexOf(el.dataset.grado)!==-1);
  });
  render();
}
function aplicarFiltros(){ currentMes=document.getElementById('filtro-mes').value; render(); }
function setVista(v){ currentVista=v; render(); }

// ── DATOS FILTRADOS ──
function getRows(){
  var rows=ALL_ROWS;
  if(currentMes) rows=rows.filter(function(r){ return r.mes===currentMes; });
  if(selectedGrados.length>0) rows=rows.filter(function(r){ return selectedGrados.indexOf(r.grado)!==-1; });
  return rows;
}

// ── RENDER ──
function render(){
  var rows=getRows();
  var cont=document.getElementById('contenido');
  var btnPdf=document.getElementById('btn-pdf');

  btnPdf.style.display='inline-flex';

  // KPIs
  var totalPesos=0,totalUnidades=0,pedidosSet={},familiasSet={};
  rows.forEach(function(r){
    totalPesos+=(r.total_linea||0); totalUnidades+=(r.cantidad||0);
    if(r.pedido) pedidosSet[r.pedido]=true;
    if(r.familia) familiasSet[r.familia]=true;
  });

  var mesTexto=currentMes?mesLabel(currentMes):'Todos los meses';
  var gradoTexto=selectedGrados.length===0?'Todos los grados':selectedGrados.join(' · ');
  var nFam=Object.keys(familiasSet).length;
  var nPed=Object.keys(pedidosSet).length;

  var html='';

  // Header grado
  html+='<div class="grado-header">'+
    '<div>'+
      '<div class="grado-titulo">'+esc(gradoTexto)+'</div>'+
      '<div class="grado-subtitulo">'+mesTexto+' · '+nFam+' '+(nFam===1?'familia':'familias')+' · '+nPed+' pedido'+(nPed!==1?'s':'')+'</div>'+
    '</div>'+
    '<div class="grado-total">'+pesos(totalPesos)+'</div>'+
  '</div>';

  // Cards KPI
  html+='<div class="cards">'+
    '<div class="card green"><div class="card-label">Total recaudado</div><div class="card-value">'+pesosCard(totalPesos)+'</div></div>'+
    '<div class="card purple"><div class="card-label">Pedidos</div><div class="card-value">'+nPed+'</div></div>'+
    '<div class="card teal"><div class="card-label">Familias</div><div class="card-value">'+nFam+'</div></div>'+
    '<div class="card orange"><div class="card-label">Unidades</div><div class="card-value">'+Math.round(totalUnidades).toLocaleString('es-AR')+'</div></div>'+
  '</div>';

  // Toggle de vista
  html+='<div class="view-toggle">'+
    '<button class="view-btn'+(currentVista==='familia'?' active':'')+'" onclick="setVista(\'familia\')">Por Familia</button>'+
    '<button class="view-btn'+(currentVista==='producto'?' active':'')+'" onclick="setVista(\'producto\')">Por Producto</button>'+
  '</div>';

  if(currentVista==='familia'){
    html+=renderFamilias(rows);
  } else {
    html+=renderProductos(rows);
  }

  cont.innerHTML=html;
}

// ── VISTA POR FAMILIA ──
function renderFamilias(rows){
  var familias={};
  rows.forEach(function(r){
    var f=r.familia||'Sin nombre';
    if(!familias[f]) familias[f]={email:r.email||'',total:0,unidades:0,items:[]};
    familias[f].total+=(r.total_linea||0);
    familias[f].unidades+=(r.cantidad||0);
    familias[f].items.push(r);
  });
  var famArr=Object.keys(familias).sort(function(a,b){ return familias[b].total-familias[a].total; });

  var html='<div class="section-card">'+
    '<div class="section-head">'+
      '<div class="section-title">Familias <span>quién compró qué · clic para expandir</span></div>'+
      '<span class="section-count">'+famArr.length+' familias</span>'+
    '</div>';

  famArr.forEach(function(fname,fi){
    var fam=familias[fname];
    html+='<div class="fam-row" onclick="toggleRow(\'fam\','+fi+')">'+
      '<div class="fam-left">'+
        '<span class="arrow" id="arr-fam-'+fi+'">▶</span>'+
        '<div><div class="fam-name">'+esc(fname)+'</div>'+(fam.email?'<div class="fam-email">'+esc(fam.email)+'</div>':'')+' </div>'+
      '</div>'+
      '<div class="fam-right">'+
        '<span class="badge-units">'+Math.round(fam.unidades)+' u.</span>'+
        '<span class="badge-pesos">'+pesos(fam.total)+'</span>'+
      '</div>'+
    '</div>';

    // Tabla productos
    var prodMap={};
    fam.items.forEach(function(item){
      var key=item.producto+'||'+item.pedido;
      if(!prodMap[key]) prodMap[key]={nombre:item.producto,marca:item.marca||'',cantidad:0,subtotal:0,pedido:item.pedido,fecha:item.fecha};
      prodMap[key].cantidad+=(item.cantidad||0);
      prodMap[key].subtotal+=(item.total_linea||0);
    });

    html+='<div class="fam-body" id="fam-'+fi+'">'+
      '<table class="tbl-inner"><thead><tr>'+
        '<th>Producto</th><th class="num">Cant.</th><th class="num">Subtotal</th><th>Pedido</th><th>Fecha</th>'+
      '</tr></thead><tbody>';
    Object.values(prodMap).forEach(function(p){
      html+='<tr>'+
        '<td>'+esc(p.nombre)+(p.marca?' <span class="chip">'+esc(p.marca)+'</span>':'')+' </td>'+
        '<td class="num">'+Math.round(p.cantidad)+'</td>'+
        '<td class="num">'+pesos(p.subtotal)+'</td>'+
        '<td><span class="txt-sm">#'+esc(p.pedido||'—')+'</span></td>'+
        '<td><span class="txt-sm">'+esc(p.fecha||'—')+'</span></td>'+
      '</tr>';
    });
    html+='</tbody></table></div>';
  });

  if(!famArr.length) html+='<div style="text-align:center;padding:40px;color:#ccc;font-size:13px">Sin compras para este período</div>';
  html+='</div>';
  return html;
}

// ── VISTA POR PRODUCTO ──
function renderProductos(rows){
  var productos={};
  rows.forEach(function(r){
    var p=r.producto||'Sin nombre';
    if(!productos[p]) productos[p]={nombre:p,marca:r.marca||'',total:0,unidades:0,familias:{}};
    productos[p].total+=(r.total_linea||0);
    productos[p].unidades+=(r.cantidad||0);
    var f=r.familia||'Sin nombre';
    if(!productos[p].familias[f]) productos[p].familias[f]={email:r.email||'',cantidad:0,subtotal:0,pedido:r.pedido,fecha:r.fecha};
    productos[p].familias[f].cantidad+=(r.cantidad||0);
    productos[p].familias[f].subtotal+=(r.total_linea||0);
  });
  var prodArr=Object.values(productos).sort(function(a,b){ return b.unidades-a.unidades; });

  var html='<div class="section-card">'+
    '<div class="section-head">'+
      '<div class="section-title">Lista de retiro <span>unidades a retirar por producto</span></div>'+
      '<span class="section-count">'+prodArr.length+' productos</span>'+
    '</div>';

  prodArr.forEach(function(prod,pi){
    var famArr=Object.keys(prod.familias).sort(function(a,b){ return prod.familias[b].cantidad-prod.familias[a].cantidad; });
    html+='<div class="prod-row" onclick="toggleRow(\'prod\','+pi+')">'+
      '<div class="prod-left">'+
        '<span class="arrow" id="arr-prod-'+pi+'">▶</span>'+
        '<div>'+
          '<div class="prod-name">'+esc(prod.nombre)+'</div>'+
          (prod.marca?'<div class="prod-marca">'+esc(prod.marca)+'</div>':'')+
        '</div>'+
      '</div>'+
      '<div class="prod-right">'+
        '<span class="badge-units-g">'+Math.round(prod.unidades)+' unidades</span>'+
        '<span class="badge-pesos">'+pesos(prod.total)+'</span>'+
      '</div>'+
    '</div>';

    html+='<div class="prod-body" id="prod-'+pi+'">'+
      '<table class="tbl-inner"><thead><tr>'+
        '<th>Familia</th><th class="num">Cant.</th><th class="num">Subtotal</th><th>Pedido</th><th>Fecha</th>'+
      '</tr></thead><tbody>';
    famArr.forEach(function(fname){
      var f=prod.familias[fname];
      html+='<tr>'+
        '<td><strong>'+esc(fname)+'</strong>'+(f.email?' <span class="txt-sm">'+esc(f.email)+'</span>':'')+' </td>'+
        '<td class="num"><span class="chip-g">'+Math.round(f.cantidad)+'</span></td>'+
        '<td class="num">'+pesos(f.subtotal)+'</td>'+
        '<td><span class="txt-sm">#'+esc(f.pedido||'—')+'</span></td>'+
        '<td><span class="txt-sm">'+esc(f.fecha||'—')+'</span></td>'+
      '</tr>';
    });
    html+='</tbody></table></div>';
  });

  if(!prodArr.length) html+='<div style="text-align:center;padding:40px;color:#ccc;font-size:13px">Sin compras para este período</div>';
  html+='</div>';
  return html;
}

function toggleRow(type,i){
  var body=document.getElementById(type+'-'+i);
  var arr=document.getElementById('arr-'+type+'-'+i);
  var open=body.classList.toggle('open');
  if(arr) arr.classList.toggle('open',open);
}

// ── PDF ──
function exportarPDF(){
  var rows=getRows();
  if(!rows.length){ alert('Sin datos para exportar.'); return; }

  var mesTexto=currentMes?mesLabel(currentMes):'Todos los meses';
  var gradoTexto=selectedGrados.length===0?'Todos los grados':selectedGrados.join(' · ');

  // Armar productos
  var productos={};
  rows.forEach(function(r){
    var p=r.producto||'Sin nombre';
    if(!productos[p]) productos[p]={nombre:p,marca:r.marca||'',unidades:0,total:0,familias:{}};
    productos[p].unidades+=(r.cantidad||0);
    productos[p].total+=(r.total_linea||0);
    var f=r.familia||'Sin nombre';
    if(!productos[p].familias[f]) productos[p].familias[f]={cantidad:0,subtotal:0,pedido:r.pedido,fecha:r.fecha,email:r.email||''};
    productos[p].familias[f].cantidad+=(r.cantidad||0);
    productos[p].familias[f].subtotal+=(r.total_linea||0);
  });
  var prodArr=Object.values(productos).sort(function(a,b){ return b.unidades-a.unidades; });

  // Armar familias
  var familias={};
  rows.forEach(function(r){
    var f=r.familia||'Sin nombre';
    if(!familias[f]) familias[f]={email:r.email||'',total:0,unidades:0,items:[]};
    familias[f].total+=(r.total_linea||0);
    familias[f].unidades+=(r.cantidad||0);
    familias[f].items.push(r);
  });
  var famArr=Object.keys(familias).sort(function(a,b){ return familias[b].total-familias[a].total; });

  var totalPesos=rows.reduce(function(s,r){ return s+(r.total_linea||0); },0);
  var totalUnidades=rows.reduce(function(s,r){ return s+(r.cantidad||0); },0);

  var html='';

  // Header
  html+='<div class="print-header">'+
    '<img src="https://escuela-dandelion.github.io/Comision-Recursos/Logo_Diente_de_Leon.png" alt="Diente de León">'+
    '<div class="print-header-info">'+
      '<h1>Lista de Retiro — '+esc(gradoTexto)+'</h1>'+
      '<p>Mes: '+mesTexto+' · '+famArr.length+' familias · '+Math.round(totalUnidades)+' unidades · '+pesos(totalPesos)+'</p>'+
    '</div>'+
    '<div class="print-header-date">Generado el '+hoy()+'</div>'+
  '</div>';

  // Recuadro resumen
  html+='<div class="print-retiro-box">'+
    '<strong>Productos a retirar del proveedor: '+prodArr.length+'</strong> &nbsp;·&nbsp; '+
    'Total unidades: <strong>'+Math.round(totalUnidades)+'</strong> &nbsp;·&nbsp; '+
    'Total recaudado: <strong>'+pesos(totalPesos)+'</strong>'+
  '</div>';

  // Tabla resumen de retiro
  html+='<div class="print-section">'+
    '<div class="print-section-title">Resumen de retiro</div>'+
    '<table class="print-tbl"><thead><tr>'+
      '<th>#</th><th>Producto</th><th>Marca</th><th class="num">Unidades</th><th class="num">Recaudado</th><th class="num">Familias</th>'+
    '</tr></thead><tbody>';
  prodArr.forEach(function(p,i){
    html+='<tr>'+
      '<td>'+(i+1)+'</td>'+
      '<td><strong>'+esc(p.nombre)+'</strong></td>'+
      '<td>'+esc(p.marca)+'</td>'+
      '<td class="num"><strong>'+Math.round(p.unidades)+'</strong></td>'+
      '<td class="num">'+pesos(p.total)+'</td>'+
      '<td class="num">'+Object.keys(p.familias).length+'</td>'+
    '</tr>';
  });
  html+='<tr class="total-row"><td colspan="3">TOTAL</td><td class="num">'+Math.round(totalUnidades)+'</td><td class="num">'+pesos(totalPesos)+'</td><td class="num">'+famArr.length+'</td></tr>';
  html+='</tbody></table></div>';

  // Detalle por producto → familias
  html+='<div class="page-break"></div>';
  html+='<div class="print-section">'+
    '<div class="print-section-title">Detalle por producto — a quién entregar</div>';
  prodArr.forEach(function(prod){
    var famKeys=Object.keys(prod.familias).sort(function(a,b){ return prod.familias[b].cantidad-prod.familias[a].cantidad; });
    html+='<div style="margin-bottom:14px">'+
      '<div style="font-weight:700;font-size:12px;color:#1a1a6e;margin-bottom:4px">'+esc(prod.nombre)+(prod.marca?' <span style="font-weight:400;color:#888">('+esc(prod.marca)+')</span>':'')+' — <span style="color:#2e7d32">'+Math.round(prod.unidades)+' unidades</span></div>'+
      '<table class="print-tbl"><thead><tr>'+
        '<th>Familia</th><th>Email</th><th class="num">Cant.</th><th class="num">Subtotal</th><th>Pedido</th>'+
      '</tr></thead><tbody>';
    famKeys.forEach(function(fname){
      var f=prod.familias[fname];
      html+='<tr>'+
        '<td>'+esc(fname)+'</td>'+
        '<td style="color:#888">'+esc(f.email)+'</td>'+
        '<td class="num"><strong>'+Math.round(f.cantidad)+'</strong></td>'+
        '<td class="num">'+pesos(f.subtotal)+'</td>'+
        '<td>#'+esc(f.pedido||'—')+'</td>'+
      '</tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='</div>';

  // Detalle por familia → productos
  html+='<div class="page-break"></div>';
  html+='<div class="print-section">'+
    '<div class="print-section-title">Detalle por familia — qué le entregamos a cada una</div>';
  famArr.forEach(function(fname){
    var fam=familias[fname];
    var prodMap={};
    fam.items.forEach(function(item){
      var key=item.producto;
      if(!prodMap[key]) prodMap[key]={nombre:item.producto,marca:item.marca||'',cantidad:0,subtotal:0};
      prodMap[key].cantidad+=(item.cantidad||0);
      prodMap[key].subtotal+=(item.total_linea||0);
    });
    html+='<div style="margin-bottom:14px">'+
      '<div style="font-weight:700;font-size:12px;color:#1a1a6e;margin-bottom:4px">'+
        esc(fname)+(fam.email?' <span style="font-weight:400;color:#888">('+esc(fam.email)+')</span>':'')+
        ' — <span style="color:#2e7d32">'+pesos(fam.total)+'</span>'+
      '</div>'+
      '<table class="print-tbl"><thead><tr>'+
        '<th>Producto</th><th>Marca</th><th class="num">Cant.</th><th class="num">Subtotal</th>'+
      '</tr></thead><tbody>';
    Object.values(prodMap).forEach(function(p){
      html+='<tr>'+
        '<td>'+esc(p.nombre)+'</td>'+
        '<td style="color:#888">'+esc(p.marca)+'</td>'+
        '<td class="num"><strong>'+Math.round(p.cantidad)+'</strong></td>'+
        '<td class="num">'+pesos(p.subtotal)+'</td>'+
      '</tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='</div>';

  document.getElementById('print-area').innerHTML=html;
  window.print();
}
</script>
