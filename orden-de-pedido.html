<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orden de Pedido — Escuela Dandelion / Diente de León</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; color: #2d2d2d; background: #f9fafb; padding: 20px 16px; max-width: 800px; margin: 0 auto; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: #fff; border-radius: 10px; border-bottom: 3px solid #3a7d44; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .logo img { max-height: 60px; width: auto; object-fit: contain; display: block; }
  .header-right { text-align: right; flex: 1; padding-left: 12px; }
  .header-right h1 { font-size: 20px; font-weight: 800; color: #3a7d44; letter-spacing: 0.5px; }
  .header-right p { font-size: 11px; color: #6b7280; margin-top: 4px; }

  /* SECCIÓN */
  .section { margin-bottom: 16px; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #3a7d44; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #c8e6c9; }

  /* GRILLA CAMPOS */
  .grid { display: grid; gap: 12px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

  .field label { display: block; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%; border: 1px solid #d1d5db; border-radius: 8px;
    padding: 10px 12px; font-size: 15px; font-family: inherit;
    background: #f9fafb; color: #2d2d2d;
    -webkit-appearance: none; appearance: none;
    min-height: 44px; box-sizing: border-box;
  }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: #3a7d44; background: #fff;
    box-shadow: 0 0 0 3px rgba(58,125,68,0.12);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field .line { border-bottom: 1px solid #9ca3af; min-height: 22px; }

  /* TABLA DE PRODUCTOS */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; }
  .prod-table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 13px; }
  .prod-table th { background: #e8f5e9; color: #3a7d44; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 6px; text-align: left; border: 1px solid #c8e6c9; white-space: nowrap; }
  .prod-table td { padding: 0; border: 1px solid #e0e0e0; vertical-align: top; }
  .prod-table td input { width: 100%; border: none; background: transparent; padding: 8px 6px; font-size: 13px; font-family: inherit; color: #2d2d2d; white-space: normal; word-break: break-word; }
  .prod-table td.col-producto input { min-height: 38px; height: auto; word-break: break-word; }
  .prod-table td input:focus { outline: none; background: #f0fdf4; }
  .prod-table tr:nth-child(even) td { background: #fafafa; }

  /* FIRMAS */
  .firmas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  .firma-box { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-top: 2px solid #3a7d44; text-align: center; font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; min-height: 80px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; }

  /* FOOTER */
  .footer { margin-top: 32px; padding-top: 12px; border-top: 1px solid #e0e0e0; text-align: center; font-size: 10px; color: #9ca3af; }

  /* MOBILE */
  @media (max-width: 600px) {
    body { padding: 12px 10px; font-size: 15px; }
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .header-right { text-align: left; padding-left: 0; }
    .header-right h1 { font-size: 16px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .firmas { grid-template-columns: 1fr; }
    .logo img { max-height: 50px; }
  }
  /* PRINT */
  @media print {
    body { background: #fff; padding: 20px 28px; font-size: 12px; }
    .section, .firmas, .firma-box { box-shadow: none; border-radius: 0; }
    @page { margin: 1.5cm; }
  }
</style>

        <tr><td class="col-producto"><input class="p-nombre" type="text" placeholder="Producto"></td><td><input class="p-unid" type="text" placeholder="Unid."></td><td><input class="p-cant" type="text" placeholder="Cant." inputmode="numeric"></td><td><input class="p-precio" type="text" placeholder="$ precio"></td></tr>

        <tr><td class="col-producto"><input class="p-nombre" type="text" placeholder="Producto"></td><td><input class="p-unid" type="text" placeholder="Unid."></td><td><input class="p-cant" type="text" placeholder="Cant." inputmode="numeric"></td><td><input class="p-precio" type="text" placeholder="$ precio"></td></tr>
        <tr><td class="col-producto"><input class="p-nombre" type="text" placeholder="Producto"></td><td><input class="p-unid" type="text" placeholder="Unid."></td><td><input class="p-cant" type="text" placeholder="Cant." inputmode="numeric"></td><td><input class="p-precio" type="text" placeholder="$ precio"></td></tr>
        <tr><td class="col-producto"><input class="p-nombre" type="text" placeholder="Producto"></td><td><input class="p-unid" type="text" placeholder="Unid."></td><td><input class="p-cant" type="text" placeholder="Cant." inputmode="numeric"></td><td><input class="p-precio" type="text" placeholder="$ precio"></td></tr>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-SRI6_udFy4ktEoE4lABW8RbDNDZAQ8cfC6ZjGKonSI2BY6R_fQZMeVIAU5tEQlzGBQ/exec';

  // ── TOTAL AUTO-CALCULADO ────────────────────────────────────────────────────
  function parsePrecio(str) {
    var s = str.replace(/[^\d.,]/g, '');
    if (!s) return 0;
    // Si tiene coma: formato argentino (punto=miles, coma=decimal) → 1.500,50
    if (s.indexOf(',') !== -1) return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
    // Solo punto: si tiene exactamente 3 dígitos después → miles (1.500); si no → decimal (850.00 de API)
    var dotIdx = s.lastIndexOf('.');
    if (dotIdx !== -1) {
      return (s.length - dotIdx - 1 === 3)
        ? parseFloat(s.replace(/\./g, '')) || 0   // 1.500 → 1500
        : parseFloat(s) || 0;                      // 850.00 → 850
    }
    return parseFloat(s) || 0;
  }

  function recalcularTotal() {
    let total = 0;
    document.querySelectorAll('#tbody-productos tr').forEach(function(fila) {
      const c  = parseFloat(fila.querySelector('.p-cant').value)  || 0;
      const pr = parsePrecio(fila.querySelector('.p-precio').value);
      total += c * pr;
    });
    const campo = document.getElementById('f-total');
    campo.value = total > 0 ? '$ ' + total.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) : '';
    return total;
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.p-cant, .p-precio').forEach(function(input) {
      input.addEventListener('input', recalcularTotal);
    });
  });

  // ── PRE-LLENADO DESDE URL PARAMS ──────────────────────────────────────────
  (function() {
    const p = new URLSearchParams(window.location.search);

    // Fecha de hoy por defecto
    document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];

    if (p.get('proveedor')) document.getElementById('f-proveedor').value = p.get('proveedor');
    if (p.get('tel'))       document.getElementById('f-tel').value       = p.get('tel');
    if (p.get('fgp'))       document.getElementById('f-fgp').value       = p.get('fgp');
    if (p.get('pago'))      document.getElementById('f-pago').value      = p.get('pago');
    if (p.get('norden'))    document.getElementById('f-norden').value    = p.get('norden');
    if (p.get('obs'))       document.getElementById('f-obs').value       = p.get('obs');

    // Productos de la URL → una fila por producto (separados por |)
    const nombres    = p.get('producto') ? p.get('producto').split('|') : [];
    const cantidades = p.get('cantidad') ? p.get('cantidad').split('|') : [];
    const precios    = p.get('precio')   ? p.get('precio').split('|')   : [];
    const unidades   = p.get('unidad')   ? p.get('unidad').split('|')   : [];

    const filasProd  = document.querySelectorAll('.p-nombre');
    nombres.forEach(function(nombre, i) {
      if (i >= filasProd.length) return;
      document.querySelectorAll('.p-nombre')[i].value = nombre || '';
      document.querySelectorAll('.p-unid')[i].value   = unidades[i] || '';
      document.querySelectorAll('.p-cant')[i].value   = '';  // FGP define la cantidad a pedir
      document.querySelectorAll('.p-precio')[i].value = precios[i]  || '';
    });
    recalcularTotal();
  })();

  // ── HELPERS ────────────────────────────────────────────────────────────────
  function leerFormulario() {
    recalcularTotal();
    const totalCampo = document.getElementById('f-total').value;
    const total      = parseFloat(totalCampo.replace(/[^\d.,]/g, '').replace(/\./g,'').replace(',','.')) || 0;

    const filasValidas = Array.from(document.querySelectorAll('#tbody-productos tr')).map(function(fila) {
      const n = fila.querySelector('.p-nombre').value.trim();
      if (!n) return null;
      return {
        nombre:   n,
        cantidad: fila.querySelector('.p-cant').value.trim(),
        unidad:   fila.querySelector('.p-unid').value.trim(),
        precio:   String(parsePrecio(fila.querySelector('.p-precio').value))
      };
    }).filter(Boolean);

    return {
      norden:    document.getElementById('f-norden').value.trim(),
      proveedor: document.getElementById('f-proveedor').value.trim(),
      fgp:       document.getElementById('f-fgp').value.trim(),
      tel:       document.getElementById('f-tel').value.trim().replace(/\D/g, ''),
      fecha:     document.getElementById('f-fecha').value,
      pago:      document.getElementById('f-pago').value.trim(),
      obs:       document.getElementById('f-obs').value.trim(),
      filasValidas,
      total,
      totalStr:  totalCampo || null
    };
  }

  // ── 1. REGISTRAR EN SHEET ──────────────────────────────────────────────────
  function registrarPedido() {
    var f = leerFormulario();

    if (!f.filasValidas.length) { alert('Agregá al menos un producto antes de registrar.'); return; }
    if (!f.norden || f.norden.includes('???') || f.norden === 'Generando…') {
      mostrarFeedback('⚠️ El N° de Orden aún no se generó. Esperá un momento y volvé a intentar.', 'warn');
      return;
    }

    var productosStr = f.filasValidas.map(function(r) {
      return r.nombre + (r.cantidad ? ' x' + r.cantidad : '') + (r.unidad ? ' ' + r.unidad : '') + (r.precio !== '0' ? ' ($' + r.precio + ')' : '');
    }).join('\n');

    var fechaFmt = f.fecha ? f.fecha.split('-').reverse().join('/') : f.fecha;

    var btn = document.getElementById('btn-registrar');
    btn.disabled = true;
    btn.style.opacity = '0.6';
    mostrarFeedback('⏳ Registrando orden en el sistema…', 'info');

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action:    'registrarPedido',
        norden:    f.norden,
        fecha:     fechaFmt,
        proveedor: f.proveedor,
        fgp:       f.fgp,
        tel:       f.tel,
        productos: productosStr,
        total:     f.total > 0 ? String(f.total) : '',
        notas:     f.obs
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      btn.style.opacity = '';
      if (data.ok) {
        mostrarFeedback('✅ Orden ' + f.norden + ' registrada correctamente.', 'ok');
        document.getElementById('btn-registrar').style.display = 'none';
        document.getElementById('btn-whatsapp').style.display = 'flex';
      } else {
        mostrarFeedback('❌ Error al registrar: ' + (data.error || 'respuesta inesperada.'), 'error');
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.style.opacity = '';
      mostrarFeedback('❌ No se pudo conectar con el servidor. Verificá tu conexión.', 'error');
    });
  }

  // ── 2. ABRIR WHATSAPP ──────────────────────────────────────────────────────
  function abrirWhatsapp() {
    var f = leerFormulario();
    if (!f.tel) { alert('Completá el teléfono del proveedor.'); return; }

    var lineasProd = '';
    f.filasValidas.forEach(function(r) {
      var detalle = [r.cantidad ? '📦 Cant: ' + r.cantidad : null, r.precio && r.precio !== '0' ? '💲 $' + r.precio : null].filter(Boolean).join('  ·  ');
      lineasProd += '• *' + r.nombre + '*' + (r.unidad ? ' (' + r.unidad + ')' : '') + '\n' + (detalle ? '   ' + detalle + '\n' : '');
    });

    var fechaFmt = f.fecha ? f.fecha.split('-').reverse().join('/') : f.fecha;

    var partes = [
      '🌼 *Orden de Pedido — Diente de León*',
      '━━━━━━━━━━━━━━━━━━━',
      f.norden    ? '🔢 N° ' + f.norden : null,
      '📅 Fecha: ' + fechaFmt,
      f.proveedor ? '🏪 Proveedor: ' + f.proveedor : null,
      '',
      '📦 *Productos solicitados:*',
      lineasProd.trimEnd(),
      f.totalStr  ? '💰 *Total: ' + f.totalStr + '*' : null,
      f.pago      ? '\n💳 Forma de pago: ' + f.pago : null,
      f.obs       ? '📝 ' + f.obs : null,
      '━━━━━━━━━━━━━━━━━━━',
      '✍️ Responsable: ' + (f.fgp || 'FGP Diente de León'),
      '🌻 Escuela Dandelion · Waldorf · Córdoba'
    ].filter(function(l) { return l !== null; }).join('\n');

    var numFinal = f.tel.startsWith('549') ? f.tel : '549' + f.tel;
    window.open('https://wa.me/' + numFinal + '?text=' + encodeURIComponent(partes), '_blank');
  }

  function mostrarFeedback(msg, tipo) {
    var el = document.getElementById('feedback-registro');
    var colores = {
      ok:    { bg: '#eaf3e6', color: '#166534', border: '#a3c4a8' },
      error: { bg: '#fef2f2', color: '#dc2626', border: '#fca5a5' },
      warn:  { bg: '#fff8e1', color: '#b45309', border: '#fcd34d' },
      info:  { bg: '#eff6ff', color: '#1d4ed8', border: '#bfdbfe' }
    };
    var c = colores[tipo] || colores.info;
    el.style.background = c.bg;
    el.style.color      = c.color;
    el.style.border     = '1px solid ' + c.border;
    el.textContent      = msg;
    el.style.display    = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
// ── CORRELATIVO AUTOMÁTICO ──────────────────────────────────
  (async function generarCorrelativo() {
    // Si el norden ya viene en la URL (generado por el script de alertas), no pisar
    if (new URLSearchParams(window.location.search).get('norden')) return;

    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1NmjnYWllrXrFpJI8GYJOjkGz90lPtvvDi0IQEYZl7-I/export?format=csv&gid=857535467';
    const input = document.getElementById('f-norden');
    try {
      const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
      const text = await resp.text();
      const lineas = text.trim().split('\n').slice(1);
      const anio = new Date().getFullYear();
      let max = 0;
      lineas.forEach(function(l) {
        const col = l.split(',')[0].replace(/"/g, '').trim();
        const m = col.match(/^ORD-(\d{4})-(\d+)$/);
        if (m && parseInt(m[1]) === anio) max = Math.max(max, parseInt(m[2]));
      });
      input.value = 'ORD-' + anio + '-' + String(max + 1).padStart(3, '0');
    } catch(e) {
      input.value = 'ORD-' + new Date().getFullYear() + '-???';
      input.placeholder = 'Error al leer el Sheet';
    }
  })();
</script>
